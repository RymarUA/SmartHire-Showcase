# Sanitized excerpt from SmartHire proprietary codebase.
# Helm chart values for production Kubernetes deployment (ADR-0028).
# Sensitive values (secrets, image registry, domain) are replaced with placeholders.

# ------------------------------------------------------------
# Image
# ------------------------------------------------------------
image:
  repository: "{{ REGISTRY }}/smarthire/app"
  tag: "{{ GIT_SHA }}"
  pullPolicy: IfNotPresent

# ------------------------------------------------------------
# Scaling
# ------------------------------------------------------------
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# PodDisruptionBudget — always keep at least 1 pod during rolling update
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ------------------------------------------------------------
# Resources
# ------------------------------------------------------------
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

# ------------------------------------------------------------
# Health probes (4 dependencies checked in readiness)
# ------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /health/live
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready    # checks postgres + redis + telegram API + payment provider
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 2

# ------------------------------------------------------------
# Security context (non-root, read-only filesystem)
# ------------------------------------------------------------
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ------------------------------------------------------------
# Pre-install hook: run Alembic migrations BEFORE new pods start
# ------------------------------------------------------------
migrations:
  enabled: true
  hook: pre-install,pre-upgrade
  command: ["uv", "run", "alembic", "upgrade", "head"]
  restartPolicy: OnFailure

# ------------------------------------------------------------
# Environment — secrets injected from Kubernetes Secret / Vault
# ------------------------------------------------------------
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: smarthire-secrets
        key: database_url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: smarthire-secrets
        key: redis_url
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: smarthire-secrets
        key: secret_key
  - name: PAYMENT_SECRET
    valueFrom:
      secretKeyRef:
        name: smarthire-secrets
        key: payment_secret

# ------------------------------------------------------------
# Ingress
# ------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: "{{ APP_DOMAIN }}"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: smarthire-tls
      hosts:
        - "{{ APP_DOMAIN }}"

# ------------------------------------------------------------
# Redis Sentinel (HA)
# ------------------------------------------------------------
redis:
  sentinel:
    enabled: true
    masterName: mymaster
    sentinelPort: 26379
  replicaCount: 3
